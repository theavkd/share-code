<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kei & Hiro Workspace IDE - V2</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #252526;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #9cdcfe;
            --button-bg: #0e639c;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }
        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        #workspace-btn, #refresh-btn {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            flex: 1;
        }
        #refresh-btn { background-color: #555; }
        #tree-view { flex: 1; overflow-y: auto; font-size: 14px; }
        .tree-node { margin-left: 15px; margin-top: 4px; margin-bottom: 4px; }
        .file-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        #main-content { flex: 1; display: flex; flex-direction: column; }
        #tab-bar { display: flex; background-color: var(--tab-bg); overflow-x: auto; border-bottom: 1px solid #3c3c3c; }
        .tab { padding: 8px 16px; background-color: var(--tab-bg); border-right: 1px solid #3c3c3c; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tab.active { background-color: var(--tab-active); border-bottom: 2px solid var(--accent-color); }
        #editor-container { flex: 1; position: relative; }
        #code-blackboard {
            width: 100%; height: 100%; background-color: var(--bg-color); color: #d4d4d4;
            font-family: 'Consolas', monospace; font-size: 16px; border: none; padding: 15px;
            box-sizing: border-box; resize: none; outline: none;
        }
        #action-bar { padding: 10px; background-color: var(--sidebar-bg); display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #3c3c3c; }
        .btn { padding: 6px 12px; border: none; cursor: pointer; border-radius: 3px; font-weight: bold; }
        #sync-btn { background-color: #28a745; color: white; display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="btn-group">
            <button id="workspace-btn" onclick="connectWorkspace()">Mở Dự Án</button>
            <button id="refresh-btn" onclick="refreshWorkspace()">🔄 Làm Tươi</button>
        </div>
        <div id="tree-view"></div>
    </div>

    <div id="main-content">
        <div id="tab-bar"></div>
        <div id="editor-container">
            <textarea id="code-blackboard" placeholder="// Chọn file hoặc đợi Kei truyền code vào đây..."></textarea>
        </div>
        <div id="action-bar">
            <span id="kei-status" style="margin-right: auto; color: #858585; font-size: 14px; align-self: center;">Kei đang theo dõi...</span>
            <button id="sync-btn" class="btn">✓ Đồng ý áp dụng xuống VS Code</button>
        </div>
    </div>

    <script>
        let virtualDOM = {}; 
        let directoryHandle = null;
        let currentOpenedFile = null;
        let isTyping = false; // Cờ chặn không cho nạp đè khi Hiro đang gõ code
        let debounceTimer = null;

        async function connectWorkspace() {
            try {
                directoryHandle = await window.showDirectoryPicker();
                await refreshWorkspace();
                startBackgroundWatcher(); // Kích hoạt bộ giám sát ngầm dữ liệu chống sụp đổ
            } catch (err) {
                console.error("Workspace access denied", err);
            }
        }

        // TỰ ĐỘNG CẬP NHẬT CẤU TRÚC FILE KHI CẦN
        async function refreshWorkspace() {
            if (!directoryHandle) return;
            // Lưu lại trạng thái check để tránh bị reset UI khi refresh
            const checkedStates = {};
            Object.keys(virtualDOM).forEach(k => { checkedStates[k] = virtualDOM[k].isChecked; });

            document.getElementById('tree-view').innerHTML = '';
            await scanDirectory(directoryHandle, document.getElementById('tree-view'), checkedStates);
            renderTabs();
            document.getElementById('kei-status').innerText = "Đã làm tươi cấu trúc Workspace!";
        }

        async function scanDirectory(dirHandle, parentElement, checkedStates = {}) {
            for await (const entry of dirHandle.values()) {
                const node = document.createElement('div');
                node.className = 'tree-node';

                if (entry.kind === 'file') {
                    const wasChecked = checkedStates[entry.name] || false;
                    node.innerHTML = `
                        <label class="file-item">
                            <input type="checkbox" class="file-filter" data-name="${entry.name}" ${wasChecked ? 'checked' : ''}>
                            <span>📄 ${entry.name}</span>
                        </label>
                    `;
                    
                    const file = await entry.getFile();
                    const content = await file.text();
                    
                    virtualDOM[entry.name] = {
                        handle: entry,
                        content: content,
                        isChecked: wasChecked
                    };

                    const checkbox = node.querySelector('.file-filter');
                    checkbox.addEventListener('change', (e) => {
                        virtualDOM[entry.name].isChecked = e.target.checked;
                        renderTabs();
                    });

                    node.querySelector('span').addEventListener('click', () => {
                        if(virtualDOM[entry.name].isChecked) {
                            switchToFile(entry.name);
                        }
                    });

                } else if (entry.kind === 'directory') {
                    node.innerHTML = `📁 <strong>${entry.name}</strong>`;
                    const childContainer = document.createElement('div');
                    node.appendChild(childContainer);
                    await scanDirectory(entry, childContainer, checkedStates);
                }
                parentElement.appendChild(node);
            }
        }

        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = '';
            Object.keys(virtualDOM).forEach(fileName => {
                if (virtualDOM[fileName].isChecked) {
                    const tab = document.createElement('div');
                    tab.className = `tab ${currentOpenedFile === fileName ? 'active' : ''}`;
                    tab.innerHTML = `<span>${fileName}</span>`;
                    tab.addEventListener('click', () => switchToFile(fileName));
                    tabBar.appendChild(tab);
                }
            });
            if (currentOpenedFile && !virtualDOM[currentOpenedFile].isChecked) {
                currentOpenedFile = Object.keys(virtualDOM).find(k => virtualDOM[k].isChecked) || null;
                if (currentOpenedFile) switchToFile(currentOpenedFile);
                else document.getElementById('code-blackboard').value = '';
            }
        }

        function switchToFile(fileName) {
            currentOpenedFile = fileName;
            document.getElementById('code-blackboard').value = virtualDOM[fileName].content;
            renderTabs();
        }

        // KỸ THUẬT GIẢM CHẤN (DEBOUNCE) - GIẢI QUYẾT TRIỆT ĐỂ VẤN ĐỀ 2 (ĐƠ/NGHẼN MẠCH)
        document.getElementById('code-blackboard').addEventListener('input', (e) => {
            if (!currentOpenedFile) return;
            isTyping = true; // Bật cờ chặn nạp đè từ hệ thống local lên web khi đang gõ
            virtualDOM[currentOpenedFile].content = e.target.value;

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                await saveFileToLocal(currentOpenedFile, e.target.value);
                isTyping = false; // Ghi xong file, mở khóa luồng dữ liệu
            }, 500); // Chờ 500ms sau khi dừng gõ mới thực hiện ghi đĩa I/O
        });

        async function saveFileToLocal(fileName, content) {
            try {
                const fileData = virtualDOM[fileName];
                if (fileData && fileData.handle) {
                    const writable = await fileData.handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                }
            } catch (err) {
                console.error("Lỗi ghi đè file local:", err);
            }
        }

        // BỘ GIÁM SÁT NGẦM (POLLING WATCHER) - GIẢI QUYẾT TRIỆT ĐỂ VẤN ĐỀ 3 CHÍ MẠNG (#3)
        function startBackgroundWatcher() {
            setInterval(async () => {
                // Nếu Hiro đang bận gõ code hoặc chưa mở file nào thì bỏ qua quét ngược để tránh xung đột
                if (isTyping || !currentOpenedFile || !virtualDOM[currentOpenedFile]) return;

                try {
                    const fileHandle = virtualDOM[currentOpenedFile].handle;
                    const file = await fileHandle.getFile();
                    const latestContent = await file.text();

                    // Nếu phát hiện nội dung dưới VS Code khác với nội dung trên bảng đen hiện tại
                    if (latestContent !== virtualDOM[currentOpenedFile].content) {
                        virtualDOM[currentOpenedFile].content = latestContent;
                        document.getElementById('code-blackboard').value = latestContent;
                        console.log(`Đã tự động kéo code mới của file ${currentOpenedFile} từ VS Code lên Web!`);
                    }
                } catch (err) {
                    console.error("Lỗi quét ngầm đồng bộ file:", err);
                }
            }, 1000); // Quét ngầm liên tục sau mỗi 1 giây
        }

        // TỰ ĐỘNG NHẬN PAYLOAD CODE TỪ KEI (#4)
        window.addEventListener('message', function(event) {
            const { action, fileName, suggestedCode } = event.data;
            if (action === 'kei_push_code' && virtualDOM[fileName]) {
                document.getElementById('code-blackboard').value = suggestedCode;
                document.getElementById('sync-btn').style.display = 'block';
                document.getElementById('kei-status').innerText = `Kei vừa gợi ý code cho file ${fileName}!`;
                
                document.getElementById('sync-btn').onclick = async function() {
                    virtualDOM[fileName].content = suggestedCode;
                    await saveFileToLocal(fileName, suggestedCode);
                    document.getElementById('sync-btn').style.display = 'none';
                    document.getElementById('kei-status').innerText = "Đã đồng bộ ý tưởng của Kei xuống VS Code!";
                    switchToFile(fileName);
                };
            }
        });
    </script>
</body>
</html>
